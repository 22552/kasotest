name: 第二集計プロジェクト

on:
  schedule:
    - cron: "0 */2 * * *"   # 例：2時間ごと（UTC）
  workflow_dispatch:

permissions:
  contents: write

# ★ 超重要：同時実行防止
concurrency:
  group: second-project-main
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ★ rebase用に必須

      - name: Make executable
        run: chmod +x ./scraper

      - name: Run scraper
        run: ./scraper 32970524 1080 第二プロジェクト.json

      - name: Commit & Push safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # ★ リモート最新を取り込む
          git pull --rebase origin main || true

          git add 第二プロジェクト.json

          # 変更があるときだけcommit
          git commit -m "Update result.json" || echo "No changes"

          # ★ 衝突しにくいpush
          git push
