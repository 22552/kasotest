name: 第二集計プロジェクト

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: second-project-main
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Git LFS
        run: git lfs install

      - name: Make executable
        run: chmod +x ./scraper

      - name: Run scraper
        run: ./scraper 32970524 1080 第二プロジェクト.json

      - name: Compress JSON
        run: |
          gzip -f 第二プロジェクト.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add 第二プロジェクト.json.gz
          git commit -m "Update compressed data" || echo "No changes"

          git push
