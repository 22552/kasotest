name: 第二集計プロジェクト

on:
  workflow_dispatch:       # 手動実行OK

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make executable
        run: chmod +x ./scraper

      - name: Run scraper
        run: ./scraper 32970524 1080 第二プロジェクト.json

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add 第二プロジェクト.json
          git commit -m "Update result.json" || exit 0
          git push
