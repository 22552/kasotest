name: Issue Image to CSS Bot (Artifact, Simple URL)

on:
  issues:
    types: [opened, edited]

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install image-to-pure-css
        run: npm install @kongyo2/image-to-pure-css

      - name: Process Issue Images
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY="${{ github.event.issue.body }}"

          # 単純に URL を抽出（http/https の文字列）
          IMG_URLS=$(echo "$ISSUE_BODY" | grep -oP 'https?://[^\s"'\''\)]+')

          if [ -z "$IMG_URLS" ]; then
            echo "No images found in the issue"
            exit 0
          fi

          mkdir -p tmp
          ARTIFACT_FILES=""

          for IMG_URL in $IMG_URLS; do
            echo "Processing $IMG_URL ..."

            # ファイル名は URL の basename（拡張子なしでもOK）
            FILE_NAME=$(basename "$IMG_URL")
            IMAGE_PATH="tmp/$FILE_NAME"
            CSS_PATH="tmp/$FILE_NAME.css"  # CSS用に拡張子を付ける

            ARTIFACT_FILES="$ARTIFACT_FILES $CSS_PATH"

            # 画像をダウンロード
            curl -L "$IMG_URL" -o "$IMAGE_PATH"

            # CSSに変換（横幅100px）
            npx @kongyo2/image-to-pure-css "$IMAGE_PATH" --width 100 > "$CSS_PATH"
          done

          # 環境変数にアップロード対象を設定
          echo "ARTIFACT_FILES=$ARTIFACT_FILES" >> $GITHUB_ENV

      - name: Upload CSS as artifact
        uses: actions/upload-artifact@v4
        with:
          name: css-artifacts
          path: ${{ env.ARTIFACT_FILES }}

      - name: Comment on Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL="https://github.com/${{ github.repository }}/suites/${{ github.run_id }}/artifacts"
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"body\":\"CSS に変換しました。アーティファクトはこちらからダウンロード可能です: $ARTIFACT_URL\"}" \
            "${{ github.event.issue.url }}/comments"
